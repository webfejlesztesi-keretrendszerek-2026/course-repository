<a class="skip-link" href="#main-content">Ugrás a tartalomra</a>
<div style="margin-bottom: var(--space-lg); text-align: right;">
	<button type="button" (click)="toggleTheme()" class="theme-toggle">Sötét mód</button>
</div>

<main id="main-content">
	<header>
		<h1>Profil & Beállítások</h1>
	</header>

	<section class="profile-section">
		<form class="profile-form" [formGroup]="form" (ngSubmit)="saveProfile()" aria-label="Profil szerkesztő">
			<img class="profile-avatar" src="https://via.placeholder.com/80x80?text=Avatar" alt="Profilkép, Minta Felhasználó">

			<div class="form-group">
				<label for="name">Név</label>
				<input id="name" type="text" formControlName="name" aria-label="Név">
			</div>

			<div class="form-group">
				<label for="email">Email</label>
				<input id="email" type="email" formControlName="email" aria-label="Email">
			</div>

			<div class="form-group">
				<label for="password">Jelszó</label>
				<input id="password" type="password" formControlName="password" placeholder="Új jelszó" aria-label="Jelszó">
			</div>

			<div class="form-group">
				<label>Diéta</label>
				<div class="diet-checkboxes">
					<label><input type="checkbox" formControlName="vegetarian" aria-label="Vegetáriánus"> Vegetáriánus</label>
					<label><input type="checkbox" formControlName="vegan" aria-label="Vegán"> Vegán</label>
					<label><input type="checkbox" formControlName="glutenFree" aria-label="Gluténmentes"> Gluténmentes</label>
					<label><input type="checkbox" formControlName="lactoseFree" aria-label="Laktózmentes"> Laktózmentes</label>
				</div>
			</div>

			<div class="form-group">
				<label for="calorie">Napi kalória cél</label>
				<div class="range-group">
					<input id="calorie" type="number" min="1200" max="3500" formControlName="calorie" aria-label="Napi kalória cél">
					  <input name="calorieRange" type="range" min="1200" max="3500" formControlName="calorie" aria-label="Napi kalória cél">
				</div>
			</div>

			<div class="form-group">
				<label for="household">Háztartás mérete</label>
				<input id="household" type="number" min="1" max="8" formControlName="household" aria-label="Háztartás mérete">
			</div>

			<button class="profile-save" type="submit" aria-label="Profil mentése">Mentés</button>

			<div class="toast" *ngIf="toastVisible" aria-live="polite">Profil mentve ✓</div>
		</form>
	</section>

	<section class="settings-section">
		<div class="settings-group">
			<div class="settings-row">
				<span class="settings-label">Megjelenés</span>
				<select class="settings-select" formControlName="theme" aria-label="Megjelenés választása">
					<option value="light">Világos</option>
					<option value="dark">Sötét</option>
					<option value="system">Rendszer</option>
				</select>
			</div>

			<div class="settings-row">
				<span class="settings-label">Mértékegység</span>
				<select class="settings-select" formControlName="units" aria-label="Mértékegység választása">
					<option value="metric">Metrikus</option>
					<option value="imperial">Angolszász</option>
				</select>
			</div>
		</div>
	</section>

	<div class="account-actions">
		<button class="account-btn" type="button" (click)="logout()" aria-label="Kijelentkezés">Kijelentkezés</button>
		<button class="account-btn danger" type="button" (click)="deleteAccount()" aria-label="Fiók törlése">Fiók törlése</button>
	</div>
</main>

<footer>
	<small>&copy; 2026 Heti Menü</small>
</footer>
