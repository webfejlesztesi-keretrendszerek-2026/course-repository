<div class="recipe-grid">
  <ng-container *ngFor="let recipe of recipes">
    <article class="recipe-card" tabindex="0" aria-label="Recept kártya" data-card>
      <img class="recipe-image" [src]="recipe.image" [alt]="recipe.title + ' - étel fotó'" loading="lazy">
      <div class="recipe-badges">
        <span class="badge" *ngFor="let badge of recipe.badges" [ngClass]="{'own': badge === 'Saját' || recipe.own}">{{ badge }}</span>
      </div>
      <div class="recipe-title">{{ recipe.title }}</div>
      <div class="recipe-meta">{{ recipe.meta }}</div>
      <div class="recipe-desc">{{ recipe.desc }}</div>
      <div class="recipe-actions">
        <button class="recipe-action-btn" (click)="openRecipe(recipe)">Megtekintés</button>
        <button class="recipe-action-btn">Hozzáadás a menühöz</button>
      </div>
    </article>
  </ng-container>
</div>

<ng-container *ngIf="selectedRecipe">
  <div class="dialog-backdrop" (click)="closeRecipe()"></div>
  <div class="dialog">
    <app-recipe-detail [recipe]="selectedRecipe" (close)="closeRecipe()"></app-recipe-detail>
    <button class="dialog-close" (click)="closeRecipe()">×</button>
  </div>
</ng-container>
